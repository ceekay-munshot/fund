# Manual run of the full pipeline (Prompts 2–6 validation).
#
# Manual (workflow_dispatch) precursor to the production cron (Prompt 7). It chains:
#   concalls index → transcript reader (defeats BSE/NSE 403s) → fund matcher →
#   sector/industry enrichment → store merge into public/data.
# The screener-test/output/ working files are uploaded as artifacts. When run with
# commit=1, the merged public/data/*.json (the dashboard's long-term memory) is
# committed back to main.
#
# Setup (one-time): repo secrets SCREENER_EMAIL and SCREENER_PASSWORD.
# Optional: FIRECRAWL_API_KEY for the last-resort fetch path.

name: test-scrape-transcripts

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap concalls processed (0 = all in window)"
        required: false
        default: "60"
      full:
        description: "FULL sweep: ignore processed-concalls skip list, reprocess whole 90-day window (1/0)"
        required: false
        default: "0"
      force:
        description: "Re-fetch even if <id>.txt exists (1/0)"
        required: false
        default: "0"
      commit:
        description: "Merge into public/data and commit it to main (1/0)"
        required: false
        default: "0"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Needed for the gated commit-back of public/data to main.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps (no-save, never committed)
        run: npm install playwright@1 cheerio@1 pdfjs-dist --no-save

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      - name: Run pipeline (Prompt 7 orchestrator)
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          LIMIT: ${{ github.event.inputs.limit }}
          FULL: ${{ github.event.inputs.full }}
          FORCE: ${{ github.event.inputs.force }}
        run: node screener-test/run-pipeline.mjs

      - name: Commit refreshed public/data to main (gated by 'commit' input)
        if: ${{ github.event.inputs.commit == '1' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/fund-sightings.json public/data/processed-concalls.json public/data/metadata.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh fund-sightings store from manual pipeline run [skip ci]"
            git push origin HEAD:main
          fi

      - name: Upload artifacts (manifest + transcripts + matches + meta + store)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transcripts-output
          path: |
            screener-test/output/transcripts-manifest.json
            screener-test/output/transcripts/
            screener-test/output/fund-matches.json
            screener-test/output/fund-matches-enriched.json
            screener-test/output/company-meta.json
            screener-test/output/company-page.png
            public/data/fund-sightings.json
            public/data/processed-concalls.json
            public/data/metadata.json
          if-no-files-found: warn
